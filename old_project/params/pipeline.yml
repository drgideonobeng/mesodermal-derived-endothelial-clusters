# pipeline.yml — all tunable parameters in one place
# Run: nextflow run main.nf -params-file params/pipeline.yml -resume

# ── Input ─────────────────────────────────────────────────────────────────────
# Absolute paths required in samplesheet (Nextflow stages the CSV into work dir)
samplesheet: "params/samplesheet.csv"

# ── Integration ───────────────────────────────────────────────────────────────
n_hvgs: 2000        # HVGs fed to fastMNN
n_dims: 30          # corrected MNN dimensions

# ── Clustering ────────────────────────────────────────────────────────────────
# Locked at 0.4 from clustree analysis. Re-run 03_cluster.R --run_sweep to revisit.
resolution: 0.4
algorithm:  1       # 1=Louvain | 2=Louvain+refine | 4=Leiden (needs leiden pkg)

# ── Markers ───────────────────────────────────────────────────────────────────
top_n_markers: 5
min_pct:       0.25
logfc:         0.25

# ── Output ────────────────────────────────────────────────────────────────────
outdir: "results/pipeline"
